<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivilVault • Module Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <div id="logo-container" class="flex items-center gap-3"></div>
                <p class="text-zinc-400 text-sm mt-1">Civil engineering modules • Built for you</p>
            </div>

            <div class="p-4 flex-1 overflow-auto">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h2 class="text-lg font-semibold text-teal-300">Modules</h2>
                    <button onclick="addModule()" 
                            class="flex items-center gap-2 bg-[var(--primary-color)] hover:brightness-110 px-5 py-2.5 rounded-3xl text-sm font-medium">
                        + New Module
                    </button>
                </div>
                <ul id="modules-list" class="space-y-1"></ul>
            </div>

            <div class="p-4 border-t border-zinc-800 text-xs text-zinc-400 flex flex-wrap gap-x-4">
                <span>Data stored locally • <span id="last-saved" class="text-teal-400">Just now</span></span>
                <button onclick="downloadJSON()" class="hover:text-white">↓ JSON</button>
                <label class="cursor-pointer hover:text-white">
                    ↑ JSON <input type="file" id="upload-json" accept=".json" class="hidden" onchange="loadJSONFile(event)">
                </label>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 border-b border-zinc-800 bg-zinc-900 px-8 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="goBackToModules()" class="lg:hidden text-3xl text-zinc-400 hover:text-white">←</button>
                    <h2 id="current-module-name" onclick="editModuleName(event)" 
                        class="text-2xl font-semibold cursor-pointer hover:text-teal-300"></h2>
                </div>
                <div id="section-tabs" class="flex bg-zinc-800 rounded-3xl p-1 text-sm"></div>
            </div>

            <div id="main-content" class="flex-1 overflow-auto p-8"></div>
        </div>
    </div>

    <!-- No module screen -->
    <div id="no-module-selected" class="hidden flex-col items-center justify-center h-full text-center">
        <div class="text-7xl mb-6">🏗️</div>
        <h3 class="text-2xl font-semibold mb-2">Select or create a module</h3>
        <p class="text-zinc-400 max-w-xs">Organize your videos, lecture files, and study resources.</p>
        <button onclick="addModule()" class="mt-8 bg-[var(--primary-color)] text-white px-8 py-4 rounded-3xl font-semibold">Create First Module</button>
    </div>

    <!-- Universal Modal -->
    <div id="modal-backdrop" onclick="if(event.target.id==='modal-backdrop')hideModal()" 
         class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" 
             class="bg-zinc-900 rounded-3xl w-full max-w-lg mx-4 shadow-2xl">
            <div id="modal-content" class="p-8"></div>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div id="video-modal" onclick="if(event.target.id==='video-modal')hideVideoModal()" 
         class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center">
        <div class="w-full max-w-5xl mx-4">
            <button onclick="hideVideoModal()" class="text-white text-4xl absolute top-6 right-6 hover:scale-110">×</button>
            <div id="video-player-container" class="aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl"></div>
            <p id="video-modal-title" class="text-white text-xl mt-4 text-center font-medium"></p>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" onclick="this.classList.add('hidden')" 
         class="hidden fixed bottom-6 right-6 bg-teal-600 text-white px-6 py-4 rounded-3xl shadow-2xl">
        <span id="toast-text"></span>
    </div>
</body>
</html>
